version: '3.8'

services:
  opencode-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    volumes:
      # Mount the current project
      - .:/workspace
      # Mount the global agent rules (read-only)
      - ~/.agents:/home/${USER}/.agents:ro
      # Persist Opencode configuration
      - ~/.opencode:/home/${USER}/.opencode
    environment:
      # Route Anthropic API calls to a local proxy (like LiteLLM) pointing to Gemma4
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-http://host.docker.internal:4000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-dummy-key}
      # MCP settings
      - JCODEMUNCH_USE_AI_SUMMARIES=false
    # Use host networking to easily reach local LLM endpoints
    network_mode: "host"
    stdin_open: true
    tty: true
