repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier (formatting)
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css, mdx, yaml, markdown]
      - id: eslint
        name: eslint (linting)
        entry: pnpm exec eslint --config .eslint.config.js --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]
      - id: typecheck
        name: typescript (type checking)
        entry: pnpm exec tsc -p .tsconfig.json --noEmit
        language: system
        types: [ts, tsx]
        pass_filenames: false
